name: Release to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      id-token: write   # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      # Extract version from release tag (v1.2.3 → 1.2.3), fall back to csproj version
      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" =~ ^v[0-9] ]]; then
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -n "$VERSION" ]]; then
            dotnet pack -c Release --no-build -o ./artifacts -p:Version="$VERSION"
          else
            dotnet pack -c Release --no-build -o ./artifacts
          fi

      - name: NuGet login (trusted publishing)
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate
