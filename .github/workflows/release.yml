name: Release to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      id-token: write   # Required for OIDC trusted publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      # Extract version from release tag (v1.2.3 → 1.2.3), fall back to csproj version
      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" =~ ^v[0-9] ]]; then
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ -n "$VERSION" ]]; then
            dotnet pack -c Release --no-build -o ./artifacts -p:Version="$VERSION"
          else
            dotnet pack -c Release --no-build -o ./artifacts
          fi

      # OIDC exchange: get a GitHub-signed token, trade it for a temporary NuGet API key
      - name: Obtain OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('https://www.nuget.org');
            core.setSecret(token);
            core.setOutput('token', token);

      - name: Exchange OIDC token for NuGet API key
        id: nuget
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://www.nuget.org/api/v2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            -d "subject_token=${{ steps.oidc.outputs.token }}" \
            -d "subject_token_type=urn:ietf:params:oauth:token-type:id-token" \
            -d "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
            -d "actor_token=${{ secrets.NUGET_USER }}" \
            -d "actor_token_type=urn:nuget:token-type:user")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::NuGet token exchange failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

          API_KEY=$(echo "$BODY" | jq -r '.access_token // .token // .apiKey // empty')
          if [[ -z "$API_KEY" ]]; then
            echo "::error::No API key in response. Body: $BODY"
            exit 1
          fi

          echo "::add-mask::$API_KEY"
          echo "api-key=$API_KEY" >> "$GITHUB_OUTPUT"
          echo "Token exchange succeeded"

      - name: Push to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "${{ steps.nuget.outputs.api-key }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
